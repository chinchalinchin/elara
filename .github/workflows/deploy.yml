name: Deploy to S3 and CloudFront

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: chinchalinchin/elara-builder:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Sphinx Build
        uses: actions/cache@v4
        with:
          # IMPORTANT: Update this path to wherever Sphinx outputs your build.
          # Common paths are 'docs/_build' or just '_build'
          path: build 
          # The key ensures we save a new cache on every commit...
          key: sphinx-${{ github.ref }}-${{ github.sha }}
          # ...and restore-keys tells it to fall back to the most recent cache for this branch
          restore-keys: |
            sphinx-${{ github.ref }}-
            sphinx-

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Make upload script executable
        run: chmod +x upload.sh

      - name: Build and Deploy
        env:
          ELARA_BUCKET: ${{ secrets.ELARA_BUCKET }}
          ELARA_DIST: ${{ secrets.ELARA_DIST }}
        run: ./upload.sh --build --invalidate