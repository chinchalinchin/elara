            source/.static/css/etc/simulation.css: css
            source/.static/css/etc/palindromes.css: css 
            source/.static/gpl/allegany-galactic.gpl: gpl
            # source/.static/rst/links.rst: rst
        # ------------------ TERRAFORM
        # ----------------------------
        tf_platform:
          title: 'Terraform Module: Core'
          files:
            README.md: markdown
            data.tf: terraform
            locals.tf: terraform
            outputs.tf: terraform
            variables.tf: terraform
            metadata/clients.json: json
            metadata/environments.json: json
            metadata/regions.json: json
            metadata/subnets.json: json
        tf_ec2: 
          title: 'Terraform Module: S3'
