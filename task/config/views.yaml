# -----------------------------------------------------------------------------------
# ----------------------------- VIEW CONFIGURATION ----------------------------------
# -----------------------------------------------------------------------------------
# TODO: MACOS Spec Command: system_profiler SPHardwareDataType
views:
  # ----------------------------- INVENTORY VIEWS
  inventory:
    # --- 1. HOST VIEWS
    host:
      certificates:
        # Command to present certificate context.
        cmd: ls -al /etc/gerberlife/SSL
      docker:
        # Commands to present Docker context.
        containers: sudo docker ps
        images: sudo docker images
        stats: sudo docker stats --no-stream
      specifications:
        # Commands to present host context.
        os: lsb_release -a
        cpu: lscpu
        memory: free
        processes: top -b -n 1 | head -n 17
    # --- 2. K8S VIEWS
      k8s:
        pods: {}
  # ----------------------------- DATA VIEWS
  data: 
    mssql:
      specifications:
        version: SELECT @@VERSION;
  # ----------------------------- TOOLS VIEWS
  tools:
    # --- 1. ARTIFACTORY VIEWS
    artifactory:
      latest: {}
    # --- 2. DOCKERHUB VIEWS
    dockerhub: {}
    # --- 3. GITHUB VIEWS
    github:
      blobs:
        # ------------------ ELARA
        # ----------------------------
        elara_build:
          title: "Elara: Build Files"
          files:
            requirements.txt: text
            Dockerfile: docker
            source/conf.py: python
        elara_linguistics:
          title: "Elara: Linguistic Scripts"
          files:
            source/.scripts/py/linguistics/poetics.py: python
            source/.scripts/py/linguistics/rhyme.py: python
            source/.scripts/py/linguistics/syllabify.py: python
            source/.scripts/py/linguistics/synonyms.py: python
            source/.scripts/py/palindromics/data.py: python
            source/.scripts/py/palindromics/functions.py: python
        elara_extensions:
          title: "Elara: Extensions"
          files:
            source/.extensions/directives/toc.py: python
            source/.extensions/directives/panels.py: python
            source/.extensions/roles/classes.py: python
            source/.extensions/roles/widgets.py: python
        elara_templates:
          title: "Elara: Templates"
          files:
