      ## VizDoom WADs

      These WADs constitute the training set of the simple models. No other models use these WADs for their training set.

      ### basic.wad

      This WAD is static, i.e. the cacodemon spawned in the middle never moves. It spawns at random points along the far end of the wall. The WAD ends when the model shoots the cacodemon.

      **Results**

      - {{ }}
      
      ### my_way_home.wad

      This WAD is a labyrinth. No enemies are spawned. It uses different colored walls to lead the model to the exit. The exit consists of a green flashing armor upgrade, to teach the model to go towards the armor.

      **Results**

      - {{ }}

      ### deadly_corridor.wad

      This WAD is a long hallway with three rooms connected with open doors. The model spawns with enemies on the left and right. The model has to move through three rooms with the exact same distribution of enemies towards the exit, which is marked by flashing green armor. 

      **Results**

      - {{ }}

      ### defend_the_center.wad

      This WAD is a large open arena where enemies spawn at random. There are marines and Pinkies. The marines wander around while the Pinkies charge directly at the model. 

      **Results**

      - {{ }}

      ### defend_the_line.wad

      This WAD is a small room where Imps spawn on the far wall along with Pinkies. The Imps throw fireballs while Pinkies charge at the model.

      **Results**

      - {{ }}

      ### take_cover.wad 

      This WAD is a small room where Imps spawn on the far wall in large numbers and throw fireballs at the model. The number of Imps increases over time, resulting in continuous waves of fireballs.

      **Results**

      -  {{ }}

      ### deathmatch.wad

      This WAD is a large arena with four rooms with multiple entrances. Friendly marines spawn in the corner and do not move. Enemies spawn at random.

      The model has historically performed poorly on this map. If the model stays in the arena, it does just fine, but if it gets stuck in a room, it tends to stop in front of a wall and "die". 

      **Results**

      - {{ }}

      ## Other WADs

      These WADs do not go into the training set of any models.

      ### doom.wad, E1M1
      
      The first level of Doom. The first room in Doom 1 is complex. It has pillars, and the room adjacent to it has a stairwell where enemies sit on an elevated surface. The only other egress is an S-shaped hallway. The model has trouble navigating this space. The previous iteration was better, or atleast appeared to be better.

      **Results**

      - {{ }}

      ### doom.wad, E1M2
      
      The second level of Doom. The first room is a large arena with lots of enemies and explosive barrels. There is a central room with a hallway that connects the ends of the arena together. 

      **Results**

      - {{ }}

      ### doom2.wad, map01
      
      The first level of Doom 2.

      **Results**

      - {{ }}

