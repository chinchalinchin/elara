  ticket: 
    # -------------------------------------------
    title: "Model Evaluation"
    # -------------------------------------------
    content: |
      Analyze the results of the latest model. Visual results given below, followed by numerical summaries. 

      !!! note "Baseline"
        No recovery data was used. Results are from baseline training data only.

      !!! note "Prior Observations"
        - Cortical depth of 4 is too deep.
        - `training.sequence_length` appears to correlates with reaction time. The longer the sequence length, the longer it takes the model to react to stimuli. This is an observation based on circumstantial evidence and hasn't been rigorously demonstrated.
        - VizDoom default scenarios bias the model through repetition of the same texture and enemies layouts. To get a generalized model, the training pipeline needs randomized data.

      **VizDoom Default Scenarios**

      !!! note
        While the default VizDoom make for poor training data, they are the only maps that can be used for the simple brain configuration. This configuration does not expose USE, and the randomizer has not method of disabling the generation of doors. Therefore, circumstantially, the simple model tends to overfit the repetitive textures and get stuck in static equilibriums.

      - simple/2026-02-24.c-2.w-128.v-1.d-0.a-0.t-0.bce.1.pth
        - brain.cortical_depth: 2
        - brain.working_memory: 128
        - brain.sensors: [ visual ]
        - training.batch_size: 16
        - training.learning_rate: 0.0001
        - training.epochs: 100
        - training.sequence_length: 32
      - simple/2026-02-24.c-3.w-128.v-1.d-0.a-0.t-0.bce.1.pth
        - brain.cortical_depth: 3
        - brain.working_memory: 128
        - brain.sensors: [ visual ]
        - training.batch_size: 16
        - training.learning_rate: 0.0001
        - training.epochs: 100
